name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PowerShell構文・静的解析チェック
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $files = Get-ChildItem -Filter *.ps1 -Recurse
          $hasError = $false
          foreach ($f in $files) {
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($f.FullName, [ref]$null, [ref]$parseErrors) | Out-Null
            if ($parseErrors.Count -gt 0) {
              Write-Host "Parse NG: $($f.Name)"
              $parseErrors | ForEach-Object { Write-Host $_.Message }
              $hasError = $true
            } else {
              Write-Host "Parse OK: $($f.Name)"
            }

            $errResults = Invoke-ScriptAnalyzer -Path $f.FullName -Severity Error
            if ($errResults) {
              Write-Host "PSScriptAnalyzer ERROR: $($f.Name)"
              $errResults | Format-Table -AutoSize | Out-String | Write-Host
              $hasError = $true
            }
            $warnResults = Invoke-ScriptAnalyzer -Path $f.FullName -Severity Warning
            if ($warnResults) {
              Write-Host "PSScriptAnalyzer WARNING (参考): $($f.Name)"
              $warnResults | Format-Table -AutoSize | Out-String | Write-Host
            }
          }
          if ($hasError) { exit 1 }

  lint-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheckインストール
        run: brew install shellcheck
      - name: Bash構文・shellcheckチェック
        run: |
          status=0
          for f in $(find . -name "*.sh"); do
            if bash -n "$f"; then
              echo "Parse OK: $f"
            else
              echo "Parse NG: $f"
              status=1
            fi
            echo "--- shellcheck (severity=error) ---"
            shellcheck --severity=error "$f" || status=1
            echo "--- shellcheck (参考: all) ---"
            shellcheck "$f" || true
          done
          exit $status
